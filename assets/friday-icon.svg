<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Deep macOS Premium Canvas Background -->
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0F141C"/>
      <stop offset="100%" stop-color="#05070A"/>
    </radialGradient>

    <!-- Local Border Metallic Gradient -->
    <linearGradient id="localRing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8E95A5"/>
      <stop offset="50%" stop-color="#4A505A"/>
      <stop offset="100%" stop-color="#1E222A"/>
    </linearGradient>

    <!-- Cloud Core Luminance Gradient -->
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00F2FF" stop-opacity="1"/>
      <stop offset="45%" stop-color="#0066FF" stop-opacity="0.8"/>
      <stop offset="75%" stop-color="#1A0066" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#00F2FF" stop-opacity="0"/>
    </radialGradient>

    <!-- Individual Thread Glow Effects -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background Base App Tile -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)"/>

  <!-- Clean, Translucent Dark Glass Intermediate Layer (Memory Boundary) -->
  <circle cx="256" cy="256" r="210" fill="#090D14" opacity="0.85" stroke="url(#localRing)" stroke-width="2.5"/>

  <!-- Volumetric Deep Under-Glow of the Hybrid Core -->
  <circle cx="256" cy="256" r="150" fill="url(#coreGlow)"/>

  <!-- The Celestial Loom: Braided Multi-Thread Core (Mathematical Waves) -->
  <g filter="url(#neonGlow)" opacity="0.9">
    <!-- Wave Cluster Alpha: Deep Indigo Anchors -->
    <path d="M 156 256 C 156 180, 356 332, 356 256 C 356 180, 156 332, 156 256 Z" fill="none" stroke="#2B00B3" stroke-width="3" stroke-dasharray="2 2"/>
    <path d="M 256 156 C 332 156, 180 356, 256 356 C 332 356, 180 156, 256 156 Z" fill="none" stroke="#2B00B3" stroke-width="3" stroke-dasharray="2 2"/>

    <!-- Wave Cluster Beta: Cyan High-Frequency Audio Processing Strands -->
    <path d="M 176 256 C 176 200, 336 312, 336 256 C 336 200, 176 312, 176 256 Z" fill="none" stroke="#00F2FF" stroke-width="1.5" opacity="0.7"/>
    <path d="M 256 176 C 312 176, 200 336, 256 336 C 312 336, 200 176, 256 176 Z" fill="none" stroke="#00F2FF" stroke-width="1.5" opacity="0.7"/>

    <!-- Dynamic Phase Shift Strands (Reasoning Nodes) -->
    <path d="M 196 256 C 196 230, 316 282, 316 256 C 316 230, 196 282, 196 256 Z" fill="none" stroke="#0066FF" stroke-width="2"/>
    <path d="M 256 196 C 282 196, 230 316, 256 316 C 282 316, 230 196, 256 196 Z" fill="none" stroke="#0066FF" stroke-width="2"/>

    <!-- The Dense Convergence Node (The Singular Local Manifestation) -->
    <circle cx="256" cy="256" r="14" fill="#FFFFFF" filter="url(#neonGlow)"/>
    <circle cx="256" cy="256" r="6" fill="#00F2FF"/>
  </g>

  <!-- High-Precision Thin Outer Calibration Rings (Native Code Bindings) -->
  <circle cx="256" cy="256" r="226" fill="none" stroke="#3A3F47" stroke-width="1" stroke-dasharray="4 16"/>
  <circle cx="256" cy="256" r="236" fill="none" stroke="#1F232B" stroke-width="1.5"/>
</svg>
